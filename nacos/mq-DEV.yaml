# 消息队列配置
mms:
  mq:
    # 是否启用（启用后注册 RocketMQ 生产者与消费者）
    enabled: true

# rocketmq配置
rocketmq:
  name-server: 127.0.0.1:9876
  producer:
    group: mms_producer
    send-message-timeout: 3000
    retry-times-when-send-failed: 2
    retry-times-when-send-async-failed: 2
  # 消费者由 @RocketMQMessageListener 声明，consumerGroup 示例：${spring.application.name}_job_run_consumer
