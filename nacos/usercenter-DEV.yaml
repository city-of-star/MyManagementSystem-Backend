# 端口配置
server:
  port: 5090

# 数据库配置
spring:
  datasource:
    url: jdbc:mysql://YOUR_DB_HOST:3306/mms_dev_core?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&rewriteBatchedStatements=true

# 登录安全配置
login:
  security:
    max-attempts: 5   # 最大登录失败次数
    attempt-window: 30 # 连续登录失败时间窗口（分钟）
    lock-time: 30  # 锁定时间（分钟）

# Swagger 配置
springdoc:
  swagger-ui:
    url: /usercenter/v3/api-docs

# 刷新令牌 Cookie 配置
security:
  cookie:
    refresh-token:
      name: "refreshToken"
      path: "/usercenter/auth"
      http-only: true
      secure: false
      same-site: "Lax"
      domain: