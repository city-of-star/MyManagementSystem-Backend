mms:
  websocket:
    # WS 端点路径
    endpoint: /ws
    # 握手阶段读取用户ID的请求头
    user-id-header: X-User-Id
    # 是否开启鉴权
    auth-enabled: true
    # 单条文本消息最大大小（字节），默认 64KB
    text-message-size-limit: 65536
    # 单个会话的发送超时时间（毫秒），默认 10s
    send-time-limit-ms: 10000
    # 单个会话的发送缓冲区大小（字节），默认 512KB
    send-buffer-size-bytes: 524288