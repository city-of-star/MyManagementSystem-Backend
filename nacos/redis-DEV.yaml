# Redis配置
spring:
  data:
    redis:
      host: YOUR_REDIS_HOST
      port: YOUR_REDIS_PORT
      password: YOUR_REDIS_PASSWORD
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20        # 根据并发量调整
          max-idle: 10          # 建议设为max-active的50-70%
          min-idle: 5           # 保持一定数量的预热连接
          max-wait: 2000ms      # 设置合理的等待时间，避免无限等待